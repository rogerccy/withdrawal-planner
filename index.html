<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdrawal Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #141414;
      --border:  #1e1e1e;
      --border2: #2a2a2a;
      --text:    #e8e8e8;
      --muted:   #777;
      --muted2:  #4a4a4a;
      --accent:  #c8a96e;
      --green:   #4a8c4a;
      --red:     #8c4a4a;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .hidden { display: none !important; }

    .lang-toggle { position: fixed; top: 20px; right: 20px; display: flex; border: 1px solid var(--border2); border-radius: 4px; overflow: hidden; z-index: 200; }
    .lang-btn { background: none; border: none; color: #555; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.06em; padding: 5px 10px; cursor: pointer; transition: color 0.15s, background 0.15s; }
    .lang-btn + .lang-btn { border-left: 1px solid var(--border2); }
    .lang-btn.active { background: var(--border2); color: var(--accent); }
    .lang-btn:hover:not(.active) { color: #888; }

    .logo     { font-size: 1.4rem; font-weight: 200; letter-spacing: 0.25em; text-transform: uppercase; }
    .subtitle { color: var(--muted); font-size: 0.82rem; text-align: center; line-height: 1.7; }
    .form-group { width: 100%; display: flex; flex-direction: column; gap: 7px; }
    .label-row { display: flex; align-items: center; gap: 6px; }
    .form-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

    .tip-btn { display: inline-flex; align-items: center; justify-content: center; width: 13px; height: 13px; border-radius: 50%; border: 1px solid var(--muted2); color: var(--muted2); font-size: 8px; line-height: 1; cursor: pointer; background: none; flex-shrink: 0; transition: border-color 0.15s, color 0.15s; font-family: inherit; }
    .tip-btn:hover { border-color: var(--muted); color: var(--text); }

    #tooltip { position: fixed; z-index: 300; background: #1c1c1c; border: 1px solid #3a3a3a; border-radius: 5px; padding: 12px 14px; max-width: 256px; width: max-content; box-shadow: 0 8px 32px rgba(0,0,0,0.6); pointer-events: none; opacity: 0; transition: opacity 0.12s; }
    #tooltip.visible { opacity: 1; pointer-events: auto; }
    .tip-title { font-size: 0.62rem; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px; }
    .tip-body  { font-size: 0.76rem; color: #999; line-height: 1.65; }

    input[type="password"], input[type="number"] { background: #181818; border: 1px solid var(--border2); color: var(--text); padding: 10px 13px; font-size: 0.92rem; border-radius: 4px; width: 100%; outline: none; transition: border-color 0.15s; font-family: inherit; }
    input:focus { border-color: #555; }
    input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

    .btn { background: var(--text); color: var(--bg); border: none; padding: 11px 24px; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: background 0.15s; width: 100%; }
    .btn:hover { background: #fff; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); padding: 10px 24px; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border-radius: 4px; width: 100%; transition: color 0.15s, border-color 0.15s; }
    .btn-ghost:hover { color: #aaa; border-color: #444; }

    .err-msg { color: #c05050; font-size: 0.78rem; text-align: center; min-height: 1em; }
    a { color: var(--muted); font-size: 0.78rem; } a:hover { color: #999; }

    .center-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; min-height: 100vh; max-width: 420px; margin: 0 auto; padding: 40px 24px; }

    .main-wrap { max-width: 960px; margin: 0 auto; padding: 28px 20px 60px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .top-logo { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted2); }
    .top-right { display: flex; align-items: center; gap: 12px; }
    .home-link { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .home-link:hover { color: var(--accent); }
    .sync-badge { font-size: 0.68rem; letter-spacing: 0.04em; color: var(--muted2); }
    .sync-badge.ok  { color: var(--green); }
    .sync-badge.bad { color: var(--red); }
    .icon-btn { background: none; border: none; color: var(--muted2); cursor: pointer; font-size: 1rem; padding: 4px; line-height: 1; transition: color 0.15s; }
    .icon-btn:hover { color: #888; }

    .calc-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 640px) { .calc-layout { grid-template-columns: 1fr; } }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 22px; }
    .panel-title { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
    .input-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .input-row:last-child { margin-bottom: 0; }
    .input-with-prefix { position: relative; display: flex; align-items: center; }
    .input-prefix { position: absolute; left: 13px; color: var(--muted); font-size: 0.85rem; pointer-events: none; z-index: 1; }
    .input-with-prefix input { padding-left: 24px; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-val { font-size: 0.9rem; font-weight: 300; min-width: 46px; text-align: right; font-variant-numeric: tabular-nums; }

    .result-main { font-size: 2.6rem; font-weight: 200; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; margin-bottom: 4px; line-height: 1; }
    .result-sub-row { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; }
    .result-sub { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .metrics { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .metric-row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .metric-row:last-child { border-bottom: none; padding-bottom: 0; }
    .metric-label { font-size: 0.72rem; color: var(--muted); }
    .metric-val { font-size: 1rem; font-weight: 300; font-variant-numeric: tabular-nums; }

    .banner { padding: 12px 16px; border-radius: 4px; font-size: 0.82rem; line-height: 1.5; margin-bottom: 16px; }
    .banner.warning { background: #1f0e0e; border: 1px solid #4a2a2a; color: #bf7a7a; }

    .g-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .g-card { background: #0f0f0f; border: 1px solid var(--border); border-radius: 4px; padding: 12px; }
    .g-card-title { font-size: 0.6rem; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .g-card-row { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
    .g-card-row span:last-child { color: var(--text); font-variant-numeric: tabular-nums; }

    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 22px 16px 10px; margin-bottom: 20px; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding: 0 6px; }
    .chart-title { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
    .chart-svg { width: 100%; display: block; overflow: visible; }
    .chart-legend { display: flex; gap: 16px; }
    .leg-item { display: flex; align-items: center; gap: 6px; font-size: 0.68rem; color: var(--muted); }
    .leg-line { width: 14px; height: 2px; border-radius: 1px; display: inline-block; }
    .leg-line.base { background: #e8e8e8; }
    .leg-line.stress { background: var(--accent); }

    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 22px 16px 16px; margin-bottom: 20px; }
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 0 6px; }
    .scen-toggle { display: flex; gap: 6px; }
    .scen-btn { background: none; border: 1px solid var(--border2); color: var(--muted); padding: 5px 12px; font-size: 0.68rem; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: all 0.15s; }
    .scen-btn:hover { color: #aaa; border-color: #444; }
    .scen-btn.active { background: var(--border2); color: var(--text); border-color: var(--border2); }
    .scen-desc { font-size: 0.72rem; color: var(--muted2); line-height: 1.5; padding: 0 6px; margin-bottom: 14px; }
    .table-scroll { overflow-y: auto; max-height: 320px; border: 1px solid var(--border); border-radius: 4px; }
    .w-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .w-table th { position: sticky; top: 0; background: #111; padding: 9px 12px; text-align: left; font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; border-bottom: 1px solid var(--border2); }
    .w-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; color: #bbb; }
    .w-table tr:last-child td { border-bottom: none; }
    .w-table td:first-child { color: var(--muted); }
    .row-cut   { background: rgba(139,60,60,0.12); }
    .row-raise { background: rgba(60,100,60,0.12); }
    .event-cut   { color: #c07070; }
    .event-raise { color: #70a870; }
    .event-normal { color: var(--muted2); }
    .depleted-row td { color: var(--red) !important; font-style: italic; }

    .solve-btn { background: transparent; border: 1px solid var(--border2); color: var(--muted); font-size: 0.62rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: color 0.15s, border-color 0.15s; font-family: inherit; }
    .solve-btn:hover { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>

<div class="lang-toggle">
  <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
  <button class="lang-btn"        id="lang-zh" onclick="setLang('zh')">中文</button>
</div>

<div id="tooltip">
  <div class="tip-title" id="tip-title"></div>
  <div class="tip-body"  id="tip-body"></div>
</div>

<div id="s-auth" class="center-screen">
  <div class="logo">FIRE</div>
  <p class="subtitle" id="auth-subtitle"></p>
  <div class="form-group">
    <label class="form-label" for="pat" id="pat-label"></label>
    <input type="password" id="pat" placeholder="ghp_…" autocomplete="off" spellcheck="false">
  </div>
  <p class="subtitle" id="auth-scope-note"></p>
  <button class="btn"       id="connect-btn"></button>
  <div class="err-msg"      id="auth-err"></div>
  <button class="btn-ghost" id="skip-btn"></button>
</div>

<div id="s-main" class="hidden">
  <div class="main-wrap">

    <div class="top-bar">
      <a class="home-link" href="https://rogerccy.github.io" id="home-link-text"></a>
      <span class="top-logo" id="top-logo-text"></span>
      <div class="top-right">
        <span class="sync-badge" id="sync-badge"></span>
        <button class="icon-btn" id="sync-btn" title="Sync now">↻</button>
      </div>
    </div>

    <div class="calc-layout">

      <div class="panel">
        <div class="panel-title" id="panel-inputs-title"></div>

        <div class="input-row">
          <label class="form-label" id="label-age"></label>
          <input type="number" id="i-age" min="18" max="99" value="50">
        </div>
        <div class="input-row">
          <div class="label-row">
            <label class="form-label" id="label-portfolio"></label>
            <button class="tip-btn" data-tip="portfolio">?</button>
          </div>
          <div class="input-with-prefix"><span class="input-prefix">$</span>
            <input type="number" id="i-savings" min="0" step="10000" value="1000000">
          </div>
        </div>
        <div class="input-row">
          <div class="label-row">
            <label class="form-label" id="label-return"></label>
            <button class="tip-btn" data-tip="ret">?</button>
          </div>
          <div class="slider-row">
            <input type="range" id="i-return" min="1" max="12" step="0.5" value="7">
            <span class="slider-val" id="v-return">7%</span>
          </div>
        </div>
        <div class="input-row">
          <div class="label-row">
            <label class="form-label" id="label-death"></label>
            <button class="tip-btn" data-tip="death">?</button>
          </div>
          <div class="slider-row">
            <input type="range" id="i-death" min="50" max="120" step="1" value="85">
            <span class="slider-val" id="v-death">85</span>
          </div>
        </div>
        <div class="input-row">
          <div class="label-row">
            <label class="form-label" id="label-iwr"></label>
            <button class="tip-btn" data-tip="iwr">?</button>
          </div>
          <div class="slider-row">
            <input type="range" id="i-iwr" min="1" max="15" step="0.25" value="5">
            <span class="slider-val" id="v-iwr">5%</span>
            <button class="solve-btn" id="solve-btn"></button>
          </div>
        </div>
        <div class="input-row">
          <div class="label-row">
            <label class="form-label" id="label-upper"></label>
            <button class="tip-btn" data-tip="upper">?</button>
          </div>
          <div class="slider-row">
            <input type="range" id="i-upper" min="10" max="40" step="5" value="20">
            <span class="slider-val" id="v-upper">+20%</span>
          </div>
        </div>
        <div class="input-row">
          <div class="label-row">
            <label class="form-label" id="label-lower"></label>
            <button class="tip-btn" data-tip="lower">?</button>
          </div>
          <div class="slider-row">
            <input type="range" id="i-lower" min="10" max="40" step="5" value="20">
            <span class="slider-val" id="v-lower">-20%</span>
          </div>
        </div>
        <div class="input-row" style="margin-bottom:0">
          <div class="label-row">
            <label class="form-label" id="label-remain"></label>
            <button class="tip-btn" data-tip="remain">?</button>
          </div>
          <div class="input-with-prefix"><span class="input-prefix">$</span>
            <input type="number" id="i-remain" min="0" step="10000" value="0">
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title" id="panel-results-title"></div>
        <div id="results-content"></div>
      </div>

    </div>

    <div class="chart-wrap hidden" id="decu-chart-wrap">
      <div class="chart-header">
        <div class="chart-title" id="chart-decu-title"></div>
        <div class="chart-legend">
          <span class="leg-item"><span class="leg-line base"></span> <span id="leg-base-label"></span></span>
          <span class="leg-item"><span class="leg-line stress"></span> <span id="leg-stress-label"></span></span>
        </div>
      </div>
      <svg id="decu-svg" class="chart-svg" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="table-wrap hidden" id="table-wrap">
      <div class="table-header">
        <div class="chart-title" id="chart-table-title"></div>
        <div class="scen-toggle">
          <button class="scen-btn active" id="scen-stress"></button>
          <button class="scen-btn"        id="scen-base"></button>
        </div>
      </div>
      <p class="scen-desc" id="scen-desc"></p>
      <div class="table-scroll">
        <table class="w-table">
          <thead><tr id="table-head-row"></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

      zh: { title: '預期年化報酬率（實質）', body: '「實質」是指扣除通膨（約3%）後的報酬。股市名目報酬約10%，實質約7%。使用實質報酬率可讓所有數字維持在今日幣值。' }
    },
    iwr: {
      en: { title: 'Initial Withdrawal Rate', body: 'The percentage of your portfolio you withdraw in year one. Higher rates mean more spending now but risk depleting sooner. Use "Solve IWR" to auto-calculate the rate that hits your target remaining balance at death.' },
      zh: { title: '初始提領率', body: '退休第一年從投資組合提取的比例。比例越高，當下支出越多但可能提早耗盡。使用「自動求解」可計算出在預期死亡年齡達到目標留存金額的提領率。' }
    },
    upper: {
      en: { title: 'Upper Guardrail', body: 'If your portfolio drops and your withdrawal rate rises above IWR × (1 + upper%), cut spending by 10%. Example: IWR 5%, upper +20% → triggers at 6%. Protects the portfolio during prolonged downturns.' },
      zh: { title: '上限護欄', body: '若投資組合下跌導致提領率超過 IWR × (1 + 上限%)，削減支出 10%。例如：IWR 5%，上限 +20% → 在 6% 時觸發。' }
    },
    lower: {
      en: { title: 'Lower Guardrail', body: 'If your portfolio grows and your withdrawal rate falls below IWR × (1 − lower%), raise spending by 10%. Example: IWR 5%, lower −20% → triggers at 4%. Lets you enjoy good market performance.' },
      zh: { title: '下限護欄', body: '若投資組合增值導致提領率低於 IWR × (1 − 下限%)，提高支出 10%。例如：IWR 5%，下限 −20% → 在 4% 時觸發。' }
    },
    death: {
      en: { title: 'Expected Death Age', body: 'The age at which your portfolio should reach the target remaining balance. Match this with your Memento Mori app setting for consistency.' },
      zh: { title: '預期死亡年齡', body: '投資組合應達到目標留存金額的年齡。建議與 Memento Mori 的設定保持一致。' }
    },
    remain: {
      en: { title: 'Target Remaining at Death', body: 'The portfolio balance you want left when you reach your expected death age. Set to $0 to fully deplete (Die With Zero). Set higher to leave a bequest or safety buffer.' },
      zh: { title: '預期留存金額', body: '在預期死亡年齡時，希望投資組合剩餘的金額。設為 $0 即為完全耗盡（歸零而終）；設為較高金額可作為遺產或安全緩衝。' }
    },
  };

  function applyLang() {
    document.documentElement.lang = S.lang === 'zh' ? 'zh-TW' : 'en';
    $('lang-en').classList.toggle('active', S.lang === 'en');
    $('lang-zh').classList.toggle('active', S.lang === 'zh');

    $('auth-subtitle').innerHTML    = t('authSubtitle').replace('\n','<br>');
    $('pat-label').textContent      = t('patLabel');
    $('auth-scope-note').innerHTML  = t('authScopeNote');
    $('connect-btn').textContent    = t('connectBtn');
    $('skip-btn').textContent       = t('skipBtn');
    $('home-link-text').textContent = t('homeLink');
    $('top-logo-text').textContent  = t('topLogo');

    $('panel-inputs-title').textContent  = t('panelInputs');
    $('panel-results-title').textContent = t('panelResults');
    $('label-age').textContent       = t('labelAge');
    $('label-portfolio').textContent = t('labelPortfolio');
    $('label-return').textContent    = t('labelReturn');
    $('label-death').textContent     = t('labelDeath');
    $('label-iwr').textContent       = t('labelIwr');
    $('label-upper').textContent     = t('labelUpper');
    $('label-lower').textContent     = t('labelLower');
    $('label-remain').textContent    = t('labelRemain');
    $('solve-btn').textContent       = t('solveBtn');

    $('chart-decu-title').textContent  = t('chartDecu');
    $('chart-table-title').textContent = t('chartTable');
    $('scen-stress').textContent = t('scenStress');
    $('scen-base').textContent   = t('scenBase');

    $('table-head-row').innerHTML = ['thYear','thAge','thPortfolio','thRate','thWithdraw','thAction']
      .map(k => `<th>${t(k)}</th>`).join('');

    syncSliderDisplays();
    if (!$('s-main').classList.contains('hidden')) calc();
    ls('fire_lang', S.lang);
  }

  function setLang(lang) { S.lang = lang; applyLang(); }

  const tipEl = $('tooltip'), tipTitle = $('tip-title'), tipBody = $('tip-body');
  let activeTip = null;

  function openTip(btn, key) {
    const tip = TIPS[key]; if (!tip) return;
    const data = tip[S.lang] || tip.en;
    tipTitle.textContent = data.title;
    tipBody.textContent  = data.body;
    tipEl.classList.remove('visible');
    tipEl.style.left = '-9999px'; tipEl.style.top = '-9999px';
    tipEl.classList.add('visible');
    const br = btn.getBoundingClientRect(), tw = tipEl.offsetWidth, th = tipEl.offsetHeight;
    const vw = window.innerWidth, vh = window.innerHeight, pad = 8;
    let left = br.left, top = br.bottom + 6;
    if (left + tw + pad > vw) left = Math.max(pad, vw - tw - pad);
    if (top + th + pad > vh)  top  = br.top - th - 6;
    tipEl.style.left = left + 'px'; tipEl.style.top = top + 'px';
    activeTip = btn;
  }

  function closeTip() { tipEl.classList.remove('visible'); activeTip = null; }

  document.addEventListener('click', e => {
    const btn = e.target.closest('.tip-btn');
    if (btn) { e.stopPropagation(); if (activeTip === btn) { closeTip(); return; } openTip(btn, btn.dataset.tip); }
    else if (activeTip) closeTip();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });

  const S = { pat: null, gistId: null, local: false, lang: 'en' };
  let saveTimer = null, tableScen = 'stress';
  let lastBaseRows = [], lastStressRows = [];

  function boot() {
    S.pat    = ls('fire_pat');
    S.gistId = ls('fire_gist_id');
    S.local  = ls('fire_local') === '1';
    S.lang   = ls('fire_lang') || 'en';

    const saved = ls('fire_cfg');
    if (saved) {
      try {
        const c = JSON.parse(saved);
        if (c.age)    $('i-age').value     = c.age;
        if (c.savings)$('i-savings').value = c.savings;
        if (c.ret)    $('i-return').value  = c.ret;
        if (c.iwr)    $('i-iwr').value     = c.iwr;
        if (c.upper)  $('i-upper').value   = c.upper;
        if (c.lower)  $('i-lower').value   = c.lower;
        if (c.death)  $('i-death').value   = c.death;
        if (c.remain !== undefined) $('i-remain').value = c.remain;
      } catch(_) {}
    }

    applyLang();
    if (S.pat || S.local) { show('main'); calc(); if (S.pat && S.gistId) pullGist(); }
    else show('auth');
  }

  function show(name) {
    ['auth','main'].forEach(n => $('s-'+n).classList.add('hidden'));
    $('s-'+name).classList.remove('hidden');
  }

  $('connect-btn').onclick = async () => {
    const pat = $('pat').value.trim(); if (!pat) return;
    $('connect-btn').textContent = t('connectingBtn'); $('connect-btn').disabled = true;
    $('auth-err').textContent = '';
    try {
      const r = await ghFetch(pat, '/user');
      if (!r.ok) throw new Error(t('invalidToken'));
      S.pat = pat; ls('fire_pat', pat);
      const gist = await findGist(pat);
      if (gist) { S.gistId = gist.id; ls('fire_gist_id', gist.id); applyGist(gist); syncSliderDisplays(); }
      show('main'); calc(); if (S.pat && S.gistId) pullGist();
    } catch(e) { $('auth-err').textContent = e.message; }
    finally { $('connect-btn').textContent = t('connectBtn'); $('connect-btn').disabled = false; }
  };
  $('skip-btn').onclick = () => { S.local=true; ls('fire_local','1'); show('main'); calc(); };

  $('scen-stress').onclick = () => {
    tableScen = 'stress';
    $('scen-stress').classList.add('active');
    $('scen-base').classList.remove('active');
    renderTable(lastStressRows);
    updateScenDesc(getInputs());
  };
  $('scen-base').onclick = () => {
    tableScen = 'base';
    $('scen-base').classList.add('active');
    $('scen-stress').classList.remove('active');
    renderTable(lastBaseRows);
    updateScenDesc(getInputs());
  };

  function syncSliderDisplays() {
    $('v-return').textContent = $('i-return').value + '%';
    $('v-iwr').textContent    = $('i-iwr').value + '%';
    $('v-upper').textContent  = '+' + $('i-upper').value + '%';
    $('v-lower').textContent  = '-' + $('i-lower').value + '%';
    $('v-death').textContent  = $('i-death').value;
  }

  ['i-age','i-savings','i-return','i-iwr','i-upper','i-lower','i-death','i-remain']
    .forEach(id => $(id).addEventListener('input', () => { syncSliderDisplays(); calc(); scheduleSave(); }));

  function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(persist, 1200); }
  $('sync-btn').onclick = () => { if (S.pat && S.gistId) pullGist(); };

  function getInputs() {
    return {
      age:      Math.max(0,    +$('i-age').value      || 50),
      savings:  Math.max(0,    +$('i-savings').value  || 0),
      ret:      Math.max(0,    +$('i-return').value   || 7) / 100,
      iwr:      Math.max(0.01, +$('i-iwr').value      || 5) / 100,
      upper:    Math.max(1,    +$('i-upper').value    || 20),
      lower:    Math.max(1,    +$('i-lower').value    || 20),
      deathAge: Math.max(50,   +$('i-death').value    || 85),
      remain:   Math.max(0,    +$('i-remain').value   || 0),
    };
  }

  function simulateDecumulation(sp, is, ret, iwr, up, lo, h, sa) {
    const rows = [];
    let port = sp, spend = is;
    const ut = iwr*(1+up/100), lt = iwr*(1-lo/100);
    rows.push({year:0, age:sa, portfolioStart:port, currentRate:iwr*100, withdraw:0, event:'start', portfolioEnd:port});
    for (let y = 1; y <= h; y++) {
      const ps = port*(1+ret), cr = ps>0 ? spend/ps : Infinity;
      let ev = 'normal';
      if (cr > ut) { spend *= 0.90; ev = 'cut'; }
      else if (cr < lt) { spend *= 1.10; ev = 'raise'; }
      const pe = Math.max(0, ps - spend);
      rows.push({year:y, age:sa+y, portfolioStart:ps, currentRate:cr*100, withdraw:spend, event:ev, portfolioEnd:pe});
      port = pe;
      if (port <= 0) break;
    }
    return rows;
  }

  function calc() {
    const inp = getInputs();

    if (inp.savings <= 0) {
      $('results-content').innerHTML = `<div class="banner warning">${t('bannerEmpty')}</div>`;
      $('decu-chart-wrap').classList.remove('hidden');
      drawChartEmpty('decu-svg');
      $('table-wrap').classList.add('hidden');
      return;
    }

    const horizon = Math.max(1, Math.round(inp.deathAge - inp.age));
    const initialWithdraw = inp.savings * inp.iwr;
    const sr = Math.max(0, inp.ret - 0.03);

    lastBaseRows   = simulateDecumulation(inp.savings, initialWithdraw, inp.ret, inp.iwr, inp.upper, inp.lower, horizon, inp.age);
    lastStressRows = simulateDecumulation(inp.savings, initialWithdraw, sr,      inp.iwr, inp.upper, inp.lower, horizon, inp.age);

    renderResults(inp, initialWithdraw, horizon);
    renderGuardrailsSummary(inp, lastBaseRows, lastStressRows);
    drawDecuChart(lastBaseRows, lastStressRows, inp.savings);
    renderTable(tableScen === 'base' ? lastBaseRows : lastStressRows);
    updateScenDesc(inp);

    $('leg-base-label').textContent   = `${t('scenBase')} (${(inp.ret*100).toFixed(1)}%)`;
    $('leg-stress-label').textContent = `${t('scenStress')} (${(sr*100).toFixed(1)}%)`;

    $('decu-chart-wrap').classList.remove('hidden');
    $('table-wrap').classList.remove('hidden');
  }

  function renderResults(inp, initialWithdraw, horizon) {
    const monthly = initialWithdraw / 12;
    const rateLabel = (inp.iwr * 100).toFixed(2);

    let html = `<div class="result-main">${fmtMoney(initialWithdraw)}</div>
      <div class="result-sub-row">
        <span class="result-sub">${t('withdrawThisYear')} &mdash; ${rateLabel}% IWR</span>
      </div>`;
    html += `<div class="metrics">`;
    html += metric(t('monthlyLabel'), fmtMoney(monthly) + t('perMonth'));
    html += metric(t('horizonLabel'), `${horizon} ${t('yearsLabel')}`);
    html += metric(t('portfolioLabel'), fmtMoney(inp.savings));
    if (inp.remain > 0) html += metric(t('targetRemain'), fmtMoney(inp.remain));
    html += `</div>`;
    html += `<div id="mode-extra"></div>`;
    $('results-content').innerHTML = html;
  }

  function renderGuardrailsSummary(inp, baseRows, stressRows) {
    const el = $('mode-extra'); if (!el) return;
    const sum = rows => {
      const last = rows[rows.length-1];
      return {
        finalPort: last.portfolioEnd,
        cuts:   rows.filter(r => r.event==='cut').length,
        raises: rows.filter(r => r.event==='raise').length,
        depleted: last.portfolioEnd <= 0,
        minSpend: Math.min(...rows.filter(r => r.year>0).map(r => r.withdraw)),
      };
    };
    const b = sum(baseRows), s = sum(stressRows);
    const sr = Math.max(0, inp.ret - 0.03);
    el.innerHTML = `<div class="g-summary">
      <div class="g-card"><div class="g-card-title">${t('scenBase')} (${(inp.ret*100).toFixed(1)}%)</div>
        <div class="g-card-row"><span>${t('gFinalPort')}</span><span>${b.depleted?t('gDepleted'):fmtMoney(b.finalPort)}</span></div>
        <div class="g-card-row"><span>${t('gCuts')}</span><span>${b.cuts}</span></div>
        <div class="g-card-row"><span>${t('gRaises')}</span><span>${b.raises}</span></div></div>
      <div class="g-card"><div class="g-card-title">${t('scenStress')} (${(sr*100).toFixed(1)}%)</div>
        <div class="g-card-row"><span>${t('gFinalPort')}</span><span style="color:${s.depleted?'#c07070':'inherit'}">${s.depleted?t('gDepleted'):fmtMoney(s.finalPort)}</span></div>
        <div class="g-card-row"><span>${t('gCuts')}</span><span style="color:${s.cuts>0?'#c07070':'inherit'}">${s.cuts}</span></div>
        <div class="g-card-row"><span>${t('gMinSpend')}</span><span>${fmtMoney(s.minSpend)}/yr</span></div></div>
    </div>`;
  }

  function updateScenDesc(inp) {
    const sr = Math.max(0, inp.ret - 0.03);
    $('scen-desc').textContent = tableScen === 'base'
      ? `${t('scenBaseDesc')} — ${(inp.ret*100).toFixed(1)}%`
      : `${t('scenStressDesc')} — ${(sr*100).toFixed(1)}%`;
  }

  function metric(label, val) {
    return `<div class="metric-row"><span class="metric-label">${label}</span><span class="metric-val">${val}</span></div>`;
  }

  const DCW=800,DCH=200,DPL=64,DPR=24,DPT=14,DPB=36,DIW=DCW-DPL-DPR,DIH=DCH-DPT-DPB;

  function drawDecuChart(br, sr, sp) {
    const av = [...br,...sr].flatMap(r => [r.portfolioStart, r.portfolioEnd||0]);
    const maxV = Math.max(sp*1.15, ...av, 1);
    const maxT = Math.max(br[br.length-1].year, sr[sr.length-1].year);
    const xS = v => DPL+(v/maxT)*DIW, yS = v => DPT+DIH-(Math.max(0,v)/maxV)*DIH;
    let gl='',yl='';
    for (let i=0;i<=4;i++) { const v=maxV*i/4,y=yS(v); gl+=`<line x1="${DPL}" y1="${y}" x2="${DPL+DIW}" y2="${y}" stroke="#1a1a1a" stroke-width="1"/>`;yl+=`<text x="${DPL-8}" y="${y+4}" text-anchor="end" fill="#888" font-size="10">${fmtMoney(v)}</text>`; }
    let xl=''; const step=maxT<=20?5:maxT<=40?10:15;
    for (let yr=0;yr<=maxT;yr+=step) xl+=`<text x="${xS(yr)}" y="${DPT+DIH+18}" text-anchor="middle" fill="#888" font-size="10">${t('chartYrPfx')} ${yr}</text>`;
    const bl = br.map(r=>`${xS(r.year)},${yS(r.portfolioEnd??r.portfolioStart)}`).join(' ');
    const sl = sr.map(r=>`${xS(r.year)},${yS(r.portfolioEnd??r.portfolioStart)}`).join(' ');
    let ed = '';
    sr.forEach(r => { if (r.event==='cut'||r.event==='raise') { const col=r.event==='cut'?'#c07070':'#70a870'; ed+=`<circle cx="${xS(r.year)}" cy="${yS(r.portfolioEnd)}" r="4" fill="${col}" opacity="0.85"/>`; } });
    $('decu-svg').innerHTML = `<clipPath id="dc"><rect x="${DPL}" y="${DPT}" width="${DIW}" height="${DIH}"/></clipPath>${gl}${yl}${xl}<g clip-path="url(#dc)"><polyline points="${bl}" fill="none" stroke="#e8e8e8" stroke-width="1.5" stroke-linejoin="round" opacity="0.5"/><polyline points="${sl}" fill="none" stroke="#c8a96e" stroke-width="1.5" stroke-linejoin="round"/>${ed}</g><line x1="${DPL}" y1="${DPT}" x2="${DPL}" y2="${DPT+DIH}" stroke="#2a2a2a" stroke-width="1"/><line x1="${DPL}" y1="${DPT+DIH}" x2="${DPL+DIW}" y2="${DPT+DIH}" stroke="#2a2a2a" stroke-width="1"/>`;
  }

  function renderTable(rows) {
    $('table-body').innerHTML = rows.filter(r => r.year>0).map(r => {
      const dep = r.portfolioEnd<=0;
      const rc  = dep?'depleted-row':r.event==='cut'?'row-cut':r.event==='raise'?'row-raise':'';
      const act = r.event==='cut'   ? `<span class="event-cut">${t('eventCut')}</span>`
                : r.event==='raise' ? `<span class="event-raise">${t('eventRaise')}</span>`
                :                    `<span class="event-normal">—</span>`;
      return `<tr class="${rc}"><td>${r.year}</td><td>${r.age}</td><td>${fmtMoney(r.portfolioStart)}</td><td>${r.currentRate.toFixed(1)}%</td><td>${fmtMoney(r.withdraw)}</td><td>${dep?`<span style="color:#c07070">${t('gDepleted')}</span>`:act}</td></tr>`;
    }).join('');
  }

  function drawChartEmpty(id) {
    $(id).innerHTML = `<text x="400" y="100" text-anchor="middle" fill="#888" font-size="13" font-family="sans-serif">${t('chartAdjust')}</text>`;
  }

  function solveIWR() {
    const inp = getInputs();
    if (inp.savings <= 0 || inp.deathAge <= inp.age) return;
    const horizon = Math.max(1, Math.round(inp.deathAge - inp.age));
    let lo = 0.005, hi = 0.60;
    for (let i = 0; i < 60; i++) {
      const mid = (lo + hi) / 2;
      const rows = simulateDecumulation(inp.savings, inp.savings * mid, inp.ret, mid, inp.upper, inp.lower, horizon, inp.age);
      const finalPort = rows[rows.length-1].portfolioEnd;
      if (finalPort > inp.remain) lo = mid;
      else hi = mid;
    }
    const solved = Math.round((lo + hi) / 2 * 400) / 400;
    $('i-iwr').value = (solved * 100).toFixed(2);
    syncSliderDisplays();
    calc();
    scheduleSave();
  }

  $('solve-btn').onclick = solveIWR;

  function ghFetch(p,path,o={}){return fetch(API+path,{...o,headers:{'Authorization':`token ${p}`,'Content-Type':'application/json',...(o.headers||{})}});}
  async function findGist(p){for(let pg=1;;pg++){const r=await ghFetch(p,`/gists?per_page=100&page=${pg}`);if(!r.ok)return null;const l=await r.json();const h=l.find(g=>g.files[GF]);if(h){const f=await ghFetch(p,`/gists/${h.id}`);return f.ok?f.json():null;}if(l.length<100)return null;}}
  function applyGist(g){try{const c=JSON.parse(g.files[GF].content);if(c.age)$('i-age').value=c.age;if(c.savings)$('i-savings').value=c.savings;if(c.ret)$('i-return').value=c.ret;if(c.iwr)$('i-iwr').value=c.iwr;if(c.upper)$('i-upper').value=c.upper;if(c.lower)$('i-lower').value=c.lower;if(c.death)$('i-death').value=c.death;if(c.remain!==undefined)$('i-remain').value=c.remain;}catch(_){}}
  async function pushGist(cfg){if(!S.pat)return;setBadge(t('syncing'));const body={description:'FIRE Calculator — settings',public:false,files:{[GF]:{content:JSON.stringify(cfg,null,2)}}};const url=S.gistId?`/gists/${S.gistId}`:'/gists';const method=S.gistId?'PATCH':'POST';const r=await ghFetch(S.pat,url,{method,body:JSON.stringify(body)});if(r.ok){const g=await r.json();S.gistId=g.id;ls('fire_gist_id',g.id);setBadge(t('synced'),'ok');}else setBadge(t('syncFailed'),'bad');}
  async function pullGist(){try{setBadge(t('syncing'));const r=await ghFetch(S.pat,`/gists/${S.gistId}`);if(!r.ok){setBadge('');return;}applyGist(await r.json());syncSliderDisplays();calc();setBadge(t('synced'),'ok');}catch(_){setBadge('');}}

  function persist(){const i=getInputs();const c={age:i.age,savings:i.savings,ret:$('i-return').value,iwr:$('i-iwr').value,upper:$('i-upper').value,lower:$('i-lower').value,death:$('i-death').value,remain:i.remain};ls('fire_cfg',JSON.stringify(c));if(S.pat)pushGist(c);}
  function ls(k,v){if(v===undefined)return localStorage.getItem(k);if(v===null)localStorage.removeItem(k);else localStorage.setItem(k,v);}
  function setBadge(txt,cls=''){const e=$('sync-badge');e.textContent=txt;e.className='sync-badge'+(cls?' '+cls:'');}
  function fmtMoney(n){if(!isFinite(n)||isNaN(n))return'—';if(n>=1e6)return'$'+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e4)return'$'+Math.round(n/1e3)+'K';if(n>=1e3)return'$'+(n/1e3).toFixed(1).replace(/\.0$/,'')+'K';return'$'+Math.round(n).toLocaleString();}

  boot();
</script>
